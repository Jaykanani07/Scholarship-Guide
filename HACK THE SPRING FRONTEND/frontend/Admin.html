<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard | Scholarship Guide</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="Admin.css">
</head>
<body>
  <!-- Navigation Header will be injected here -->
  <nav id="pageNavbar" class="navbar navbar-expand-lg"></nav>

  <div class="container mt-5 admin-container">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="admin-title">Admin Dashboard - Schemes</h2>
      <button class="btn btn-primary btn-add" data-toggle="modal" data-target="#schemeModal" onclick="openAddModal()">
        <i class="material-icons align-middle">add</i> Add Scheme
      </button>
    </div>

    <!-- Schemes Table -->
    <div class="table-responsive bg-white rounded shadow-sm p-3">
      <table class="table table-hover align-middle">
        <thead class="thead-light">
          <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Description</th>
            <th class="text-right">Actions</th>
          </tr>
        </thead>
        <tbody id="schemesTableBody">
          <!-- Rows dynamically populated -->
          <tr>
            <td colspan="4" class="text-center py-4">Loading schemes...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Scheme Add/Edit Modal -->
  <div class="modal fade" id="schemeModal" tabindex="-1" role="dialog" aria-labelledby="schemeModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document">
      <div class="modal-content border-0 shadow-lg">
        <form id="schemeForm">
          <div class="modal-header bg-primary text-white">
            <h5 class="modal-title" id="schemeModalLabel">Add New Scheme</h5>
            <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body px-4">
            <input type="hidden" id="schemeId" />

            <div class="row">
              <div class="col-md-6 form-group">
                <label for="schemeName" class="font-weight-bold">Scheme Name</label>
                <input type="text" class="form-control" id="schemeName" required placeholder="Enter scheme name">
              </div>
              <div class="col-md-6 form-group">
                <label for="schemeCategory" class="font-weight-bold">Category</label>
                <select class="form-control" id="schemeCategory" required>
                  <option value="" disabled selected>Select Category</option>
                  <option value="Education">Education</option>
                  <option value="Health">Health care</option>
                  <option value="Agriculture">Agriculture</option>
                  <option value="Housing">Housing</option>
                  <option value="Pension">Pension</option>
                  <option value="Business">Business</option>
                  <option value="Financial schemes">Financial schemes</option>
                </select>
              </div>
            </div>

            <div class="form-group mt-2">
              <label for="schemeDescription" class="font-weight-bold">Description</label>
              <textarea class="form-control" id="schemeDescription" rows="3" required placeholder="Brief description of the scheme"></textarea>
            </div>

            <div class="form-group mt-2">
              <label for="schemeEligibility" class="font-weight-bold">Eligibility Criteria</label>
              <textarea class="form-control" id="schemeEligibility" rows="2" placeholder="Who can apply?"></textarea>
            </div>

            <div class="form-group mt-2">
              <label for="schemeDocuments" class="font-weight-bold">Documents Required</label>
              <textarea class="form-control" id="schemeDocuments" rows="2" placeholder="List of required documents"></textarea>
            </div>

            <div class="row">
              <div class="col-md-6 form-group mt-2">
                <label for="schemeBenefits" class="font-weight-bold">Benefits</label>
                <textarea class="form-control" id="schemeBenefits" rows="2" placeholder="Financial or other benefits"></textarea>
              </div>
              <div class="col-md-6 form-group mt-2">
                <label for="schemeSteps" class="font-weight-bold">Steps for applying</label>
                <textarea class="form-control" id="schemeSteps" rows="2" placeholder="How to apply"></textarea>
              </div>
            </div>

            <div class="alert alert-danger mt-3 d-none" id="modalError"></div>
          </div>
          <div class="modal-footer bg-light">
            <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary" id="saveSchemeBtn">Save Scheme</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <footer class="footer text-center py-4 mt-5 bg-dark text-white-50">
    &copy; 2026 Scholarship Guide. All rights reserved.
  </footer>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
  
  <script>
    const API_URL = "http://localhost:3000";
    let token = localStorage.getItem("token");
    let allSchemes = [];

    $(document).ready(function () {
      // Check admin status immediately before fully loading
      if (!token) {
        window.location.href = "Login.html";
      } else {
        $.ajax({
          url: `${API_URL}/loggedIn`,
          headers: { "Authorization": "Bearer " + token },
          success: function(data) {
            if (data.role !== 'admin') {
              alert("Access denied. Admin only.");
              window.location.href = "Home.html";
            } else {
              // Load navbar and fetch schemes
              $("#pageNavbar").load("NavBar.html");
              fetchSchemes();
            }
          },
          error: function() {
            window.location.href = "Login.html";
          }
        });
      }

      // Handle Form Submit
      $("#schemeForm").on("submit", function(e) {
        e.preventDefault();
        saveScheme();
      });
    });

    function fetchSchemes() {
      $("#schemesTableBody").html('<tr><td colspan="4" class="text-center py-4">Loading...</td></tr>');
      $.ajax({
        url: `${API_URL}/schemes`,
        method: "GET",
        success: function(data) {
          allSchemes = data;
          renderSchemesTable();
        },
        error: function(err) {
          $("#schemesTableBody").html(`<tr><td colspan="4" class="text-center text-danger">Failed to load schemes: ${err.responseText || 'Error'}</td></tr>`);
        }
      });
    }

    function renderSchemesTable() {
      const tbody = $("#schemesTableBody");
      tbody.empty();
      if (allSchemes.length === 0) {
        tbody.append('<tr><td colspan="4" class="text-center py-4 text-muted">No schemes found. Add one to get started!</td></tr>');
        return;
      }

      allSchemes.forEach(sc => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="font-weight-600">${sc.scheme_name}</td>
          <td><span class="badge badge-info bg-soft-primary px-3 py-2">${sc.category}</span></td>
          <td class="text-muted text-truncate" style="max-width: 300px;">${sc.description}</td>
          <td class="text-right">
            <button class="btn btn-sm btn-outline-primary mr-2" onclick="openEditModal('${sc.id}')">
              <i class="material-icons" style="font-size:16px;">edit</i> Edit
            </button>
            <button class="btn btn-sm btn-outline-danger" onclick="deleteScheme('${sc.id}')">
              <i class="material-icons" style="font-size:16px;">delete</i> Delete
            </button>
          </td>
        `;
        tbody.append(tr);
      });
    }

    function openAddModal() {
      document.getElementById("schemeForm").reset();
      document.getElementById("schemeId").value = "";
      document.getElementById("schemeModalLabel").innerText = "Add New Scheme";
      $("#modalError").addClass("d-none");
    }

    function openEditModal(id) {
      // Find scheme by ID, converting both to strings to ensure match regardless of BigInt parsing
      const sc = allSchemes.find(s => String(s.id) === String(id));
      if(!sc) return;

      document.getElementById("schemeId").value = sc.id;
      document.getElementById("schemeName").value = sc.scheme_name || "";
      // Map "Financial" to "Financial schemes" so the dropdown selects properly for old entries
      let matchedCategory = sc.category;
      if (matchedCategory === "Financial") matchedCategory = "Financial schemes";
      document.getElementById("schemeCategory").value = matchedCategory;
      document.getElementById("schemeDescription").value = sc.description;
      document.getElementById("schemeEligibility").value = sc.eligibility_criteria || "";
      document.getElementById("schemeDocuments").value = sc.documents_required || "";
      document.getElementById("schemeBenefits").value = sc.benefits || "";
      document.getElementById("schemeSteps").value = sc.steps_for_applying || "";

      document.getElementById("schemeModalLabel").innerText = "Edit Scheme";
      $("#modalError").addClass("d-none");
      $("#schemeModal").modal('show');
    }

    function saveScheme() {
      const id = document.getElementById("schemeId").value;
      const isEdit = id !== "";

      const payload = {
        scheme_name: document.getElementById("schemeName").value.trim(),
        category: document.getElementById("schemeCategory").value,
        description: document.getElementById("schemeDescription").value.trim(),
        eligibility_criteria: document.getElementById("schemeEligibility").value.trim(),
        documents_required: document.getElementById("schemeDocuments").value.trim(),
        benefits: document.getElementById("schemeBenefits").value.trim(),
        steps_for_applying: document.getElementById("schemeSteps").value.trim(),
      };

      const myBtn = document.getElementById("saveSchemeBtn");
      myBtn.disabled = true;
      myBtn.innerText = "Saving...";

      $.ajax({
        url: isEdit ? `${API_URL}/admin/schemes/${id}` : `${API_URL}/admin/schemes`,
        method: isEdit ? "PUT" : "POST",
        headers: {
          "Authorization": "Bearer " + token,
          "Content-Type": "application/json"
        },
        data: JSON.stringify(payload),
        success: function() {
          $("#schemeModal").modal('hide');
          fetchSchemes(); // reload
        },
        error: function(err) {
          $("#modalError").removeClass("d-none").text(err.responseJSON ? err.responseJSON.error : "Failed to save scheme.");
        },
        complete: function() {
          myBtn.disabled = false;
          myBtn.innerText = "Save Scheme";
        }
      });
    }

    function deleteScheme(id) {
      if(!confirm("Are you sure you want to delete this scheme?")) return;
      $.ajax({
        url: `${API_URL}/admin/schemes/${id}`,
        method: "DELETE",
        headers: { "Authorization": "Bearer " + token },
        success: function() {
          fetchSchemes();
        },
        error: function(err) {
          alert("Failed to delete: " + (err.responseJSON ? err.responseJSON.error : "Error"));
        }
      });
    }
  </script>
</body>
</html>
