<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protected</title>
</head>
<body>
    <h1>Protected Page</h1>
    <p id="message"></p>
    <button id="logoutButton">Logout</button>
    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'Login.html';
        }

        document.getElementById('logoutButton').addEventListener('click', () => {
            // Remove the token from localStorage
            localStorage.removeItem('token');
            // Redirect to the login page or the logged out route
            window.location.href = 'https://scholarship-guide.onrender.com/logout';
        });

        fetch('https://scholarship-guide.onrender.com/protected', {
            headers: {
                'Authorization': `Bearer ${token}`,
            },
        })
        .then(response => response.json())
        .then(data => {
            document.getElementById('message').textContent = data.message;
        })
        .catch(error => {
            console.error('Error:', error);
            alert('Failed to access protected route');
        });
    </script>
</body>
</html>
