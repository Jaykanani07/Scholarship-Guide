<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="Contact.css" />
  </head>

  <body>
    <nav id="pageNavbar" class="navbar navbar-expand-lg"></nav>
    <div style="display: flex; margin: 70px">
      <div style="width: 70%">
        <h1 class="form-heading col-12 custom-education-details">Contact us</h1>
        <div class="col-md-10" style="padding: 20px; padding-left: 50px">
          <input
            type="text"
            class="form-control"
            id="inputName"
            placeholder="Name"
          />
        </div>
        <div class="col-md-10" style="padding: 20px; padding-left: 50px">
          <input
            type="email"
            class="form-control"
            id="inputEmail"
            placeholder="Email"
          />
        </div>
        <div class="col-md-10" style="padding: 20px; padding-left: 50px">
          <input
            type="text"
            class="form-control"
            id="inputMessage"
            placeholder="Message"
          />
        </div>
        <div class="col-12 custom-regbtn">
          <button type="submit" class="btn btn-block custom-btn" id="sendBtn">Send Message</button>
        </div>
        <div id="contactAlert" style="display:none; margin-top:20px; padding: 15px; border-radius: 8px; font-weight: 500;"></div>
      </div>
      <div style="width: 50%">
        <img src="4849052.webp" alt="" />
      </div>
    </div>
    <footer class="footer">
      &copy; 2026 Scholarship Guide. All rights reserved.
    </footer>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
    <script>
      $(document).ready(function () {
        // Load navbar
        $("#pageNavbar").load("NavBar.html");

        // Handle Contact Form Submission
        $("#sendBtn").on("click", function (e) {
          e.preventDefault();
          
          const name = $("#inputName").val().trim();
          const email = $("#inputEmail").val().trim();
          const message = $("#inputMessage").val().trim();
          const alertBox = $("#contactAlert");

          alertBox.hide();

          if (!name || !email || !message) {
            alertBox.text("Please fill in all fields (Name, Email, Message).")
                    .css({ backgroundColor: "#fef2f2", color: "#dc2626", border: "1px solid #fecaca" })
                    .show();
            return;
          }

          // Strict email validation checking for gmail.com
          const emailRegex = /^[^\s@]+@gmail\.com$/i;
          if (!emailRegex.test(email)) {
            alertBox.text("Please enter a valid Gmail address (e.g. example@gmail.com).")
                    .css({ backgroundColor: "#fef2f2", color: "#dc2626", border: "1px solid #fecaca" })
                    .show();
            return;
          }

          const btn = $(this);
          const originalText = btn.text();
          btn.text("Sending...").prop("disabled", true);

          $.ajax({
            url: "http://localhost:3000/contact",
            type: "POST",
            contentType: "application/json",
            data: JSON.stringify({ name, email, message }),
            success: function (res) {
              alertBox.text("Your message has been sent successfully! We will get back to you soon.")
                      .css({ backgroundColor: "#f0fdf4", color: "#16a34a", border: "1px solid #bbf7d0" })
                      .show();
              // Clear inputs
              $("#inputName").val("");
              $("#inputEmail").val("");
              $("#inputMessage").val("");
              btn.text(originalText).prop("disabled", false);
            },
            error: function (xhr) {
              alertBox.text("Failed to send message: " + (xhr.responseJSON?.error || "Server error"))
                      .css({ backgroundColor: "#fef2f2", color: "#dc2626", border: "1px solid #fecaca" })
                      .show();
              btn.text(originalText).prop("disabled", false);
            }
          });
        });
      });
    </script>
  </body>
</html>
